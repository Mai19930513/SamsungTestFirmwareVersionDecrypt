name: 生成固件解密json文件

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,3,5,7,10,12,14,16,18,20 * * *'
  repository_dispatch:
    types: [telegram_trigger]

# 添加权限声明，确保能把生成的 JSON 推送回仓库
permissions:
  contents: write

jobs:
  decrypt:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4 # 升级到 v4

    - name: 设置 Python 3.10
      uses: actions/setup-python@v5 # 升级到 v5
      with:
        python-version: "3.10"

    - name: 安装 python 依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 运行解密脚本
      env:
        DATABASE: ${{ secrets.DATABASE }}
        HOST: ${{ secrets.HOST }}
        DBUSER: ${{ secrets.DBUSER }}
        PASSWORD: ${{ secrets.PASSWORD }}
        FCM_API_KEY: ${{ secrets.FCM_API_KEY }}
        FCM_KEY: ${{ secrets.FCM_KEY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_USER_ID: ${{ secrets.TG_USER_ID }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        # 建议文件名如果带空格，使用引号包裹
        python "三星测试版固件版本号解密.py"

    - name: 提交并推送更新
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        export TZ='Asia/Shanghai'
        git add .
        # 检查是否有文件变更，避免空提交报错
        if ! git diff --cached --quiet; then
          git commit -m "自动更新固件解密JSON [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
        else
          echo "没有检测到文件更新，跳过推送。"
        fi
